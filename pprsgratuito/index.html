<body>

<h2>Você está sendo redirecionado em <span id="contador">3</span> segundos...</h2>

<script>
let tempo = 3;
let destino = "https://drive.google.com/drive/folders/1oyHJ7fLs45jfHjvm1K4gX0Y3xUlKlzqr?usp=sharing";

let contador = document.getElementById("contador");

let intervalo = setInterval(function() {
  tempo--;
  contador.innerHTML = tempo;

  if (tempo <= 0) {
    clearInterval(intervalo);
    window.location.href = destino;
  }
}, 1000);
</script>

</body>
</html>
