<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J3PDZC29M6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-J3PDZC29M6');
  </script>

  <title>Redirecionando...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    #contador {
      font-size: 60px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div>
    <h1>Você será redirecionado em:</h1>
    <div id="contador">3</div>
  </div>

  <script>
    var tempo = 3;
    var destino = "https://pay.kiwify.com.br/XUkxZ3o"; // TROQUE AQUI

    var contador = document.getElementById("contador");

    var intervalo = setInterval(function() {
      tempo--;
      contador.innerHTML = tempo;

      if (tempo <= 0) {
        clearInterval(intervalo);
        window.location.href = destino;
      }
    }, 1000);
  </script>

</body>
</html>
